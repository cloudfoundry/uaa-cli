# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w
      - -X code.cloudfoundry.org/uaa-cli/version.Version={{.Version}}
      - -X code.cloudfoundry.org/uaa-cli/version.Commit={{.ShortCommit}}
    binary: uaa

archives:
  - formats: [binary]
    # Use same naming convention as before: uaa-{os}-{arch}-{version}
    name_template: >-
      uaa-
      {{- .Os }}-
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else if eq .Arch "386" }}386
      {{- else }}{{ .Arch }}{{ end }}-
      {{- .Version }}

release:
  # Repository to release to.
  github:
    owner: cloudfoundry
    name: uaa-cli
  
  # You can change the name of the release.
  name_template: "UAA CLI Release {{.Version}}"
  
  # If set to auto, will mark the release as not ready for production
  # in case there is an indicator for this in the tag e.g. v1.0.0-rc1
  prerelease: auto
  
  # What to do with the release notes in case there the release already exists.
  mode: replace

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Branch }}-{{ .ShortCommit }}"

changelog:
  # This automatically uses PRs merged since the last tag
  # Shows clickable PR links (#123) and usernames (@user)
  use: github-native

homebrew_casks:
 - name: uaa-cli
   homepage: https://github.com/cloudfoundry/uaa-cli
   description: "CLI for UAA written in Go"
   license: "Apache-2.0"
   repository:
     owner: cloudfoundry
     name: homebrew-tap
     branch: master
     token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
   # This will update the existing formula safely
   commit_author:
     name: cf-identity
     email: cf-identity-eng@pivotal.io
   commit_msg_template: "Release {{ .ProjectName }} {{ .Tag }}"
   # Conflicts with the old formula-based version
   conflicts:
     - cask: uaa-cli
   # Hooks for post-installation
   hooks:
    post:
      install: |
        if OS.mac?
          Dir.glob("#{staged_path}/uaa*").each do |file|
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", file]
          end
        end