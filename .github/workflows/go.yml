name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  go-versions:
    name: Lookup Go versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - uses: arnested/go-version-action@6a9d1e0bcc9db5b1693bb7b0ad37491d205f67b6
        id: versions

  build:
    name: Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: go-versions
    strategy:
      matrix:
        version: ${{ fromJSON(needs.go-versions.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.version }}
        check-latest: true

    - name: Go Version
      run: go version

    - name: Build
      run: go build -v ./...

    - name: Test
      run: make test

    - name: GoReleaser Check
      uses: goreleaser/goreleaser-action@v7
      with:
        version: '~> v2'
        args: check
        workdir: .

    - name: GoReleaser Build
      uses: goreleaser/goreleaser-action@v7
      with:
        version: '~> v2'
        args: build --snapshot --clean --single-target --output .
        workdir: .